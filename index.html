<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student SOS Portal</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #001f3f; /* Dark Blue */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #000000; /* Dark/Black */
            padding: 2rem;
            border-radius: 15px;
            border: 2px solid #004080; /* Blue accent */
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        h1 { color: #3399ff; }
        textarea {
            width: 100%;
            height: 100px;
            margin: 1rem 0;
            border-radius: 5px;
            border: none;
            padding: 10px;
            box-sizing: border-box;
        }
        button {
            background-color: #004080;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #0066cc; }
        .mascot-text { font-style: italic; color: #3399ff; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Student SOS</h1>
        <p>The Jaguar is listening. How can we help?</p>
        <textarea placeholder="Type your message here..."></textarea>
        <br>
        <button onclick="alert('Message sent to the Social Worker!')">Send SOS</button>
        <p class="mascot-text">🐾 Dark Spot Jaguar Protection Active</p>
    </div>
</body>
</html>
